services:

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50001:50000"
    restart: unless-stopped
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

  jenkins-init:
    image: python:3.11-slim
    depends_on:
      - jenkins
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./:/workspace
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_USER=admin
    command: >
      bash -c "
      dpkg --configure -a &&
      apt-get update && apt-get install -y curl &&
      pip install --quiet requests &&
      echo 'Waiting for Jenkins...' &&
      until curl -s http://jenkins:8080/login > /dev/null; do sleep 5; done &&
      echo 'Jenkins is ready' &&
      python3 /workspace/jenkins_init_jobs_fixed.py
      "
    restart: on-failure

  fastapi:
    build:
      context: ./fast_api
    container_name: fastapi
    ports:
      - "8000:8000"
    depends_on:
      - jenkins
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./:/workspace
    environment:
      - JENKINS_URL=http://jenkins:8080
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_DEBUG=0
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:11434/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 180s  # Increased from 120s to give Ollama more time to start

  ollama-puller:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    container_name: ollama-puller
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: |-
      /bin/bash -c "
      set -e

      echo '[ollama-puller] Waiting for Ollama server to be ready...'
      for i in {1..60}; do
        if curl -sS http://ollama:11434/ > /dev/null 2>&1; then
          echo '[ollama-puller] ✓ Ollama server is ready'
          break
        fi
        echo \"[ollama-puller] Waiting... ($i/60)\"
        sleep 2
      done

      echo '[ollama-puller] Checking for llama3 model...'

      if ollama list | grep -q llama3; then
        echo '[ollama-puller] ✓ Model already present'
        exit 0
      fi

      echo '[ollama-puller] Pulling llama3 model (this may take several minutes)...'

      ollama pull llama3

      echo '[ollama-puller] ✓ Model pull complete'
      "

  agent:
    build:
      context: .
      dockerfile: adk_agent/Dockerfile
    container_name: agent
    ports:
      - "8100:8100"
    depends_on:
      fastapi:
        condition: service_started
      ollama:
        condition: service_started
      ollama-puller:
        condition: service_completed_successfully
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - OLLAMA_URL=http://ollama:11434
    restart: unless-stopped
    volumes:
      - ./:/workspace
  streamlit:
    build:
      context: ./streamlit
    container_name: streamlit
    ports:
      - "8501:8501"
    depends_on:
      agent:
        condition: service_started
      fastapi:
        condition: service_started
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
    restart: unless-stopped

volumes:
  jenkins_data:
  ollama_data:
  agent:
  fastapi: